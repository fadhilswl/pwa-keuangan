<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catatan Keuangan</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>💰 Catatan Keuangan</h1>
    </header>

    <section class="card summary-section">
      <h2>Saldo Saat Ini</h2>
      <div class="wallet-balances">
        <div class="wallet-card">
          <p>Cash</p>
          <h3 id="saldoCash">Rp 0</h3>
        </div>
        <div class="wallet-card">
          <p>Bank Jago</p>
          <h3 id="saldoJago">Rp 0</h3>
        </div>
      </div>
    </section>

    <section class="card form-section">
      <h2>Tambah Transaksi</h2>
      <form id="txForm">
        <div class="form-group">
          <label>Tipe Transaksi</label>
          <div class="radio-group">
            <label><input type="radio" name="tipe" value="Pengeluaran" checked> Pengeluaran</label>
            <label><input type="radio" name="tipe" value="Pemasukan"> Pemasukan</label>
            <label><input type="radio" name="tipe" value="Transfer"> Transfer</label>
          </div>
        </div>

        <div class="form-group">
          <label for="kategori">Kategori</label>
          <select id="kategori" required></select>
        </div>

        <div class="form-group">
          <label id="labelDompetDari" for="dompet">Dompet / Akun</label>
          <select id="dompet" required>
            <option value="Cash">Cash (Uang Tunai)</option>
            <option value="Bank Jago">Bank Jago</option>
          </select>
        </div>

        <div class="form-group" id="transferGroup" style="display: none;">
          <label for="dompetKe">Ke Dompet</label>
          <select id="dompetKe">
            <option value="Bank Jago">Bank Jago</option>
            <option value="Cash">Cash (Uang Tunai)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="jumlah">Jumlah (Rp)</label>
          <input type="number" id="jumlah" placeholder="Contoh: 50000" required>
        </div>

        <div class="form-group">
          <label for="keterangan">Keterangan (Opsional)</label>
          <input type="text" id="keterangan" placeholder="Contoh: Beli makan siang">
        </div>

        <button type="submit" id="submitBtn">Simpan Transaksi</button>
      </form>
    </section>

    <section class="card filter-section">
      <h2>Laporan Bulanan</h2>
      <div class="form-group">
        <label for="filterBulan">Pilih Bulan & Tahun:</label>
        <input type="month" id="filterBulan">
      </div>
    </section>

    <div id="loading" style="display:none; text-align:center; margin-bottom:15px;">Memuat data...</div>

    <section class="card chart-section">
      <div class="chart-container">
        <div>
          <h3>Pengeluaran</h3>
          <canvas id="expenseChart"></canvas>
        </div>
        <div>
          <h3>Pemasukan</h3>
          <canvas id="incomeChart"></canvas>
        </div>
      </div>
    </section>

    <section class="card history-section">
      <h2>Riwayat Transaksi</h2>
      <div class="table-responsive">
        <table id="historyTable">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Tipe</th>
              <th>Dompet</th>
              <th>Kategori</th>
              <th>Jumlah</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
