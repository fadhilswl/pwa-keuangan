<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FI.nance ❤️💰</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>FI.nance ❤️💰</h1>
    </header>

    <section class="wallet-container" id="walletContainer"></section>

    <section class="card">
      <div class="card-header">Tambah Transaksi</div>
      <form id="txForm">
        <div class="form-group">
          <div class="radio-group">
            <label><input type="radio" name="tipe" value="Pengeluaran" checked> Pengeluaran</label>
            <label><input type="radio" name="tipe" value="Pemasukan"> Pemasukan</label>
            <label><input type="radio" name="tipe" value="Transfer"> Transfer</label>
          </div>
        </div>
        <div class="form-group"><label for="kategori">Kategori</label><select id="kategori" required></select></div>
        <div class="form-group"><label id="labelDompetDari" for="dompet">Dompet</label><select id="dompet" required></select></div>
        <div class="form-group" id="transferGroup" style="display: none;"><label for="dompetKe">Ke Dompet</label><select id="dompetKe"></select></div>
        <div class="form-group"><label for="jumlah">Jumlah (Rp)</label><input type="number" id="jumlah" placeholder="0" required></div>
        <div class="form-group"><label for="keterangan">Keterangan</label><input type="text" id="keterangan" placeholder="Opsional"></div>
        <button type="submit" id="submitBtn">Simpan Transaksi</button>
      </form>
    </section>

    <section class="card">
      <div class="card-header">Riwayat Transaksi</div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Tanggal</th><th>Tipe</th><th>Dompet</th><th>Kategori</th><th>Jumlah</th><th>Keterangan</th><th>Aksi</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="card-header">Laporan Bulanan</div>
      <div class="form-group"><input type="month" id="filterBulan"></div>
      
      <div class="report-summary">
        <div class="summary-box">
          <p>Penghasilan</p>
          <h4 id="repIncome" class="text-green">Rp 0</h4>
        </div>
        <div class="summary-box">
          <p>Pengeluaran</p>
          <h4 id="repExpense" class="text-red">Rp 0</h4>
        </div>
        <div class="summary-box">
          <p>Total (Sisa)</p>
          <h4 id="repTotal">Rp 0</h4>
        </div>
      </div>

      <div id="loading" style="display:none; text-align:center; color: var(--text-muted); margin: 10px 0;">Memuat data...</div>
      <div class="chart-container">
        <div><h3 class="chart-title">Pengeluaran</h3><canvas id="expenseChart"></canvas></div>
        <div><h3 class="chart-title">Pemasukan</h3><canvas id="incomeChart"></canvas></div>
      </div>
    </section>

    <section class="card settings-card">
      <div class="card-header">⚙️ Kelola Kustomisasi</div>
      
      <div class="form-group">
        <label>Pilih Tema Aplikasi</label>
        <div class="theme-selector">
          <button class="theme-btn theme-dark" onclick="setTheme('dark')" title="Dark Mode"></button>
          <button class="theme-btn theme-light" onclick="setTheme('light')" title="Light Mode"></button>
          <button class="theme-btn theme-blue" onclick="setTheme('blue')" title="Midnight Blue"></button>
          <button class="theme-btn theme-purple" onclick="setTheme('purple')" title="Deep Purple"></button>
        </div>
      </div>
      <hr style="border: 1px solid var(--border-color); margin: 15px 0;">

      <div class="form-group">
        <label>Kelola Kategori</label>
        <div class="inline-form">
          <select id="manageKatTipe" onchange="renderManageLists()">
            <option value="Pengeluaran">Pengeluaran</option>
            <option value="Pemasukan">Pemasukan</option>
            <option value="Transfer">Transfer</option>
          </select>
          <input type="text" id="newKatName" placeholder="Nama Kategori">
          <button type="button" class="btn-small" onclick="tambahKategori()">+</button>
        </div>
        <div class="manage-list" id="manageKatList"></div>
      </div>
      <hr style="border: 1px solid var(--border-color); margin: 15px 0;">
      <div class="form-group">
        <label>Kelola Dompet</label>
        <div class="inline-form">
          <input type="text" id="newWalletName" placeholder="Nama Dompet">
          <button type="button" class="btn-small" onclick="tambahDompet()">+</button>
        </div>
        <div class="manage-list" id="manageWalletList"></div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
