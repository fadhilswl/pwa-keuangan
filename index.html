<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FI.nance ❤️💰</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>FI.nance ❤️💰</h1>
    </header>

    <section class="wallet-container" id="walletContainer"></section>

    <section class="card">
      <div class="card-header">Tambah Transaksi</div>
      <form id="txForm">
        <div class="form-group">
          <div class="radio-group">
            <label><input type="radio" name="tipe" value="Pengeluaran" checked> Pengeluaran</label>
            <label><input type="radio" name="tipe" value="Pemasukan"> Pemasukan</label>
            <label><input type="radio" name="tipe" value="Transfer"> Transfer</label>
          </div>
        </div>

        <div class="form-group">
          <label for="kategori">Kategori</label>
          <select id="kategori" required></select>
        </div>

        <div class="form-group">
          <label id="labelDompetDari" for="dompet">Dompet</label>
          <select id="dompet" required></select>
        </div>

        <div class="form-group" id="transferGroup" style="display: none;">
          <label for="dompetKe">Ke Dompet</label>
          <select id="dompetKe"></select>
        </div>

        <div class="form-group">
          <label for="jumlah">Jumlah (Rp)</label>
          <input type="number" id="jumlah" placeholder="0" required>
        </div>

        <div class="form-group">
          <label for="keterangan">Keterangan</label>
          <input type="text" id="keterangan" placeholder="Opsional">
        </div>

        <button type="submit" id="submitBtn">Simpan Transaksi</button>
      </form>
    </section>

    <section class="card">
      <div class="card-header">Riwayat Transaksi</div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Tipe</th>
              <th>Dompet</th>
              <th>Kategori</th>
              <th>Jumlah</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="card-header">Laporan Bulanan</div>
      <div class="form-group">
        <input type="month" id="filterBulan">
      </div>
      <div id="loading" style="display:none; text-align:center; color: var(--text-muted); margin: 10px 0;">Memuat data database...</div>
      <div class="chart-container">
        <div>
          <h3 class="chart-title">Pengeluaran</h3>
          <canvas id="expenseChart"></canvas>
        </div>
        <div>
          <h3 class="chart-title">Pemasukan</h3>
          <canvas id="incomeChart"></canvas>
        </div>
      </div>
    </section>

    <section class="card settings-card">
      <div class="card-header">⚙️ Pengaturan Kustom</div>
      <div class="form-group">
        <label>Tambah Kategori Baru</label>
        <div class="inline-form">
          <select id="addKatTipe">
            <option value="Pengeluaran">Pengeluaran</option>
            <option value="Pemasukan">Pemasukan</option>
          </select>
          <input type="text" id="newKatName" placeholder="Nama Kategori">
          <button type="button" class="btn-small" onclick="tambahKategoriKustom()">+</button>
        </div>
      </div>
      <div class="form-group">
        <label>Tambah Dompet Baru</label>
        <div class="inline-form">
          <input type="text" id="newWalletName" placeholder="Nama Dompet">
          <button type="button" class="btn-small" onclick="tambahDompetKustom()">+</button>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
